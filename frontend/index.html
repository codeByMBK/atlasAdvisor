<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AtlasAdvisor</title>
    <meta name="description" content="AtlasAdvisor analyses your MongoDB database and recommends targeted performance improvements for indexes, schema design, and query patterns." />
    <meta name="application-name" content="AtlasAdvisor" />
    <meta name="theme-color" content="#020617" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: light)" />
    <meta name="msapplication-TileColor" content="#020617" />

    <link rel="canonical" href="__META_SITE_URL__/" />

    <!-- Icons: same asset referenced at common sizes (browser/OS pick best) -->
    <link rel="icon" href="/favicon.png" type="image/png" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" sizes="180x180" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AtlasAdvisor" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="__META_SITE_URL__/" />
    <meta property="og:title" content="AtlasAdvisor — MongoDB Performance Recommender" />
    <meta property="og:description" content="Connect any MongoDB database and get actionable recommendations for indexes, schema, and query performance in seconds." />
    <meta property="og:image" content="__META_SITE_URL__/PrimaryImage.png" />
    <meta property="og:image:secure_url" content="__META_SITE_URL__/PrimaryImage.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="AtlasAdvisor — MongoDB performance recommendations preview" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AtlasAdvisor — MongoDB Performance Recommender" />
    <meta name="twitter:description" content="Connect any MongoDB database and get actionable recommendations for indexes, schema, and query performance in seconds." />
    <meta name="twitter:image" content="__META_SITE_URL__/PrimaryImage.png" />
    <meta name="twitter:image:alt" content="AtlasAdvisor — MongoDB performance recommendations preview" />

    <!-- Fonts: DM Sans (landing page), Inter (app), JetBrains Mono (code) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- FOUC prevention: apply saved theme class before first paint -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('atlasadvisor_theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = saved ? saved === 'dark' : prefersDark !== false;
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
